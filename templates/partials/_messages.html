{% if messages %}
<div class="fixed top-4 right-4 z-[9999] space-y-2 max-w-sm w-full">
  {% for message in messages %}
  <div class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-soft-md text-sm text-white
    {% if message.tags == 'error' %}bg-red-500{% elif message.tags == 'warning' %}bg-yellow-500{% elif message.tags == 'success' %}bg-green-500{% else %}bg-blue-500{% endif %}
    transform transition-all duration-300 ease-soft">
    <span class="mt-0.5">
      {% if message.tags == 'error' %}<i class="fas fa-circle-exclamation"></i>
      {% elif message.tags == 'warning' %}<i class="fas fa-triangle-exclamation"></i>
      {% elif message.tags == 'success' %}<i class="fas fa-check-circle"></i>
      {% else %}<i class="fas fa-info-circle"></i>{% endif %}
    </span>
    <span class="flex-1">{{ message }}</span>
    <button type="button" onclick="this.parentElement.remove();" class="opacity-80 hover:opacity-100">
      <i class="fas fa-xmark"></i>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
