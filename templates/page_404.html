{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'img/apple-icon.png' %}" />
  <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}" />
  <title>404 - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <link href="{% static 'css/nucleo-icons.css' %}" rel="stylesheet" />
  <link href="{% static 'css/nucleo-svg.css' %}" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="{% static 'css/soft-ui-dashboard-tailwind.min.css' %}" rel="stylesheet" />
</head>
<body class="m-0 font-sans antialiased font-normal text-base dark:bg-slate-950 bg-gray-50 text-slate-500 dark:text-white">
  <main class="relative h-screen flex items-center justify-center">
    <div class="text-center px-6">
      <h1 class="text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-tl from-blue-600 to-cyan-400">404</h1>
      <h2 class="text-2xl font-bold text-slate-700 dark:text-white mt-4">Page Not Found</h2>
      <p class="text-slate-500 dark:text-slate-400 mt-2">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      <a href="{% url 'home' %}" class="inline-block px-6 py-3 mt-6 font-bold text-center text-white uppercase align-middle transition-all bg-transparent border-0 rounded-lg cursor-pointer shadow-soft-md bg-x-25 bg-150 leading-pro text-xs ease-soft-in tracking-tight-soft bg-gradient-to-tl from-blue-600 to-cyan-400 hover:scale-102 hover:shadow-soft-xs active:opacity-85">
        <i class="fas fa-home mr-2"></i> Back to Home
      </a>
    </div>
  </main>
</body>
</html>
